<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TH Mixer Selector</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #001919;
            color: white;
            text-align: center;
            padding: 20px;
        }

        h1 {
            padding: 20px 0;
            margin-bottom: 30px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .card {
            background: #123;
            padding: 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            font-weight: bold;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 180px;
        }

        .card img {
            max-width: 100%;
            max-height: 150px;
            object-fit: contain;
            margin-bottom: 10px;
        }

        .card:hover {
            background: #1f4d4d;
            border-color: #2dd4bf;
            transform: translateY(-5px);
            box-shadow: 0 4px 12px rgba(45, 212, 191, 0.2);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #1a1a1a;
            padding: 40px;
            border-radius: 12px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.8);
        }

        .modal-content h2 {
            margin-bottom: 15px;
            font-size: 24px;
        }

        .modal-content img {
            max-width: 100%;
            max-height: 300px;
            object-fit: contain;
            margin-bottom: 20px;
        }

        .modal-content p {
            margin-bottom: 30px;
            font-size: 16px;
            line-height: 1.6;
        }

        .close {
            background: #2dd4bf;
            color: #0b2c2c;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            border: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .close:hover {
            background: #1abc9c;
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            }
        }
    </style>
</head>
<body>
      <h1>TH Mixer Selector</h1>

    <div class="grid">
        <div class="card" onclick="openModal( 'Gin, Vodka, Tequila', '')">
            <img src="https://www.thomas-henry.com/wp-content/uploads/2021/05/TH_TW_02l_o_Hintergrund.png" alt="Indian Tonic Bottle">
            <span>Indian Tonic</span>
        </div>
        <div class="card" onclick="openModal('Botanical Tonic', 'Gin, Vodka')">Botanical Tonic</div>
        <div class="card" onclick="openModal('Dry Tonic', 'Gin, Vodka, Tequila')">Dry Tonic</div>
        <div class="card" onclick="openModal('Cherry Blossom', 'Vodka, Gin, Mezcal')">Cherry Blossom</div>
        <div class="card" onclick="openModal('Bitter Lemon', 'Vodka, Tequila, Gin, White Rum')">Bitter Lemon</div>
        <div class="card" onclick="openModal('Vivid Watermelon', 'Gin, Vodka, Tequila, Calvados, Rosé Wine')">Wild Berry Tonic</div>
        <div class="card" onclick="openModal('Spicy Ginger', 'Gin, Vodka, Tequila, Rum')">Spicy Ginger</div>
        <div class="card" onclick="openModal('Ginger Ale', 'Cognac, Whiskey, Rum, Calvados')">Ginger Ale</div>
        <div class="card" onclick="openModal('Soda Water', 'Gin, Vodka')">Soda Water</div>
        <div class="card" onclick="openModal('Mystic Mango', 'Gin, Vodka, Tequila, Calvados, Cognac')">Mystic Mango</div>
        <div class="card" onclick="openModal('Pink Grapefruit', 'Tequila, Gin, Vodka, Rosé Wine')">Pink Grapefruit</div>
    </div>

    <div id="modal" class="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 id="title"></h2>
            <img id="modalImage" src="" alt="Product Image" style="display:none;">
            <p id="content"></p>
            <button class="close" onclick="closeModal()">Close</button>
        </div>
    </div>

    <script>
        function openModal(name, alcohol, imageUrl = null) {
            document.getElementById("title").innerText = name;
            document.getElementById("content").innerText = "Best with: " + alcohol;
            
            const modalImage = document.getElementById("modalImage");
            if (imageUrl) {
                modalImage.src = imageUrl;
                modalImage.style.display = "block";
            } else {
                modalImage.style.display = "none";
            }
            
            document.getElementById("modal").classList.add("active");
        }

        function closeModal() {
            document.getElementById("modal").classList.remove("active");
        }

        // Close modal on Escape key
        document.addEventListener("keydown", (e) => {
            if (e.key === "Escape") closeModal();
        });
    </script>
</body>
</html>
